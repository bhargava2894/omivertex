# Production overrides. Activate with: --spring.profiles.active=prod
# Every secret MUST come from the environment — there are deliberately no fallbacks.

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

omivertex.auth.admin-password=${OMIVERTEX_ADMIN_PASSWORD}
omivertex.auth.viewer-password=${OMIVERTEX_VIEWER_PASSWORD}

# No demo seed data in production
omivertex.seed=false

# HTTPS-only session cookie (requires TLS termination in front of the app)
server.servlet.session.cookie.secure=true

# Schema is owned by Flyway migrations; never let Hibernate mutate a prod DB
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
