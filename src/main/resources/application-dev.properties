# Dev / staging profile — a faithful replica of prod so a dev environment
# exercises the same schema management (Flyway) and security as production.
# Activate with:  SPRING_PROFILES_ACTIVE=dev   (or --spring.profiles.active=dev)
# Every secret is supplied by the environment — there are deliberately no fallbacks.

# Database — provided by the environment. Point at a FRESH database so Flyway can
# build the schema from V1 (see docs/DEPLOYMENT.md — an existing Hibernate-made DB
# needs baseline handling).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Internal accounts — supplied by the environment (must not be the dev defaults).
omivertex.auth.admin-password=${OMIVERTEX_ADMIN_PASSWORD}
omivertex.auth.viewer-password=${OMIVERTEX_VIEWER_PASSWORD}

# Schema is owned by Flyway migrations and validated against the entities — identical
# to prod, so migration issues surface here before they reach production.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Seed the skill taxonomy so testers have data to work with. Idempotent (only seeds
# when the taxonomy is empty). Set OMIVERTEX_SEED=false to match prod exactly.
omivertex.seed=${OMIVERTEX_SEED:true}

# The session cookie's Secure flag requires HTTPS. Defaults to true (assumes TLS,
# like prod). If the dev environment is served over plain HTTP, set COOKIE_SECURE=false
# or logins will silently fail (the browser won't send a Secure cookie over HTTP).
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
