spring.application.name=omivertex

# Database — overridden by env in real deployments (defaults ease local dev)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/omivertex}
spring.datasource.username=${DB_USERNAME:bhargavasista}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Internal accounts — override via env; the prod profile refuses the known defaults
omivertex.auth.admin-password=${OMIVERTEX_ADMIN_PASSWORD:Admin@123}
omivertex.auth.viewer-password=${OMIVERTEX_VIEWER_PASSWORD:Viewer@123}

# Session cookie hardening (Secure is switched on in the prod profile; needs HTTPS).
# SameSite=strict is the compensating control for CSRF being disabled on this
# same-origin cookie-session API.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Bound the roster/skills import upload so a huge file can't exhaust memory
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

omivertex.seed=true
