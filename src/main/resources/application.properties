spring.application.name=omivertex

# Database — overridden by env in real deployments (defaults ease local dev)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/omivertex}
spring.datasource.username=${DB_USERNAME:bhargavasista}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Dev uses Hibernate auto-DDL; Flyway owns the schema only in the prod profile
spring.flyway.enabled=false

# Internal accounts — override via env; the prod profile refuses the known defaults
omivertex.auth.admin-password=${OMIVERTEX_ADMIN_PASSWORD:Admin@123}
omivertex.auth.viewer-password=${OMIVERTEX_VIEWER_PASSWORD:Viewer@123}

omivertex.auth.google.client-id=909667978002-1f5rmue04mrvftk4p5v3l2076vng6t56.apps.googleusercontent.com

# Session cookie hardening (Secure is switched on in the prod profile; needs HTTPS).
# SameSite=strict is the compensating control for CSRF being disabled on this
# same-origin cookie-session API.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Bound the roster/skills import upload so a huge file can't exhaust memory
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Monitoring: expose ONLY the health endpoint over HTTP (never env/beans/etc.,
# which could leak configuration). Anonymous probes see just {"status":"UP"};
# component details (DB, disk) are shown only to authenticated users.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

omivertex.seed=true

# Dashboard AI assistant (Gemini). Empty key = assistant disabled (fail closed).
# NEVER put a real key here — this file is committed. Use the env var, or the
# gitignored ./application-local.properties (imported below) for local runs.
omivertex.assistant.gemini.api-key=${OMIVERTEX_ASSISTANT_GEMINI_API_KEY:}
omivertex.assistant.gemini.model=${OMIVERTEX_ASSISTANT_GEMINI_MODEL:gemini-3.1-flash-lite}
# Bounded upstream I/O — a hung Gemini call must never hold an ai-* thread forever.
omivertex.assistant.gemini.connect-timeout=${OMIVERTEX_ASSISTANT_GEMINI_CONNECT_TIMEOUT:5s}
omivertex.assistant.gemini.read-timeout=${OMIVERTEX_ASSISTANT_GEMINI_READ_TIMEOUT:30s}

# Optional local overrides (secrets) — file is gitignored and absent in prod.
spring.config.import=optional:file:./application-local.properties
