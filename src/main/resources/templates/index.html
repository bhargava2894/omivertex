<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmiVertex · Softility</title>
    <link rel="icon" type="image/png" th:href="@{/logo-mark.png}" />
    <script>
      (function () {
        var t = localStorage.getItem('ov-theme') || 'system';
        if (t === 'system') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" th:src="@{/assets/app.js}"></script>
  </body>
</html>
