spring.datasource.url=jdbc:h2:mem:omivertex;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Tests build the schema with Hibernate on H2; Flyway (Postgres SQL) stays off
spring.flyway.enabled=false

omivertex.seed=false
